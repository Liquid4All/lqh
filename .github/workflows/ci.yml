on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  python-lint:
    name: python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install 3.11
      - run: uv tool run ruff check .

  python-tests:
    name: python tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --frozen --group dev --python ${{ matrix.python-version }}
      - run: uv run pytest tests/unit -v
      # Import-check every pytest suite (function/e2e/harness) without auth
      # or cost — catches broken imports and stale module paths in test
      # modules and conftests.
      - run: uv run pytest tests --collect-only -q
      # The benchmark/experiment runners are standalone python -m entry
      # points that pytest never imports; exercise their import chains via
      # --help (argparse exits 0 before any real work).
      - run: uv run python -m tests.benchmarks.orchestration.runner --help > /dev/null
      - run: uv run python -m tests.benchmarks.orchestration.aggregate_report --help > /dev/null
      - run: uv run python -m tests.benchmarks.base_vs_instruct.run --help > /dev/null
      - run: uv run python -m tests.experiments.experiment_e2e_pipeline --help > /dev/null

  json-lint:
    name: json lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npx --yes prettier@3 --check '**/*.json'
